<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>image2arduino - Arduino image converter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">image<span>2</span>arduino</div>
      <div class="subtitle">Arduino / Embedded image converter</div>
    </header>

    <div class="main">
      <!-- ── LEFT PANEL ─────────────────────────────────────── -->
      <div class="panel-left">
        <!-- Upload -->
        <div class="panel-section">
          <h3>Bilder laden</h3>
          <div class="dropzone" id="dropzone">
            <div class="icon">🖼️</div>
            <p><strong>Klicken oder Bilder hierher ziehen</strong></p>
            <p style="margin-top: 4px">PNG, JPG, BMP, GIF, WebP</p>
          </div>
          <input type="file" id="file-input" multiple accept="image/*" />
        </div>

        <!-- Format -->
        <div class="panel-section">
          <h3>Ausgabeformat</h3>
          <div class="form-row">
            <label for="format">Pixel-Format</label>
            <select id="format">
              <option value="rgb565">
                RGB565 — uint16_t (TFT, ILI9341, ST7789)
              </option>
              <option value="rgb888">RGB888 — uint8_t x 3 (raw)</option>
              <option value="gray8">Graustufen — uint8_t (8-Bit)</option>
              <option value="mono_h">Monochrom horiz. — 1 Bit (Bitmap)</option>
              <option value="mono_v">
                Monochrom vert. — 1 Bit (SSD1306 OLED)
              </option>
            </select>
          </div>
          <div class="form-row" id="threshold-row" style="display: none">
            <label for="threshold">Schwellenwert (Threshold)</label>
            <div class="slider-row">
              <input
                type="range"
                id="threshold"
                min="0"
                max="255"
                value="128"
              />
              <span class="slider-val" id="threshold-val">128</span>
            </div>
          </div>
        </div>

        <!-- Resize -->
        <div class="panel-section">
          <h3>Größe anpassen</h3>
          <div class="toggle-row">
            <label for="do-resize">Resize aktivieren</label>
            <label class="toggle">
              <input type="checkbox" id="do-resize" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div id="resize-options" style="display: none; margin-top: 10px">
            <div class="form-inline">
              <div class="form-row">
                <label for="resize-w">Breite (px)</label>
                <input
                  type="number"
                  id="resize-w"
                  value="128"
                  min="1"
                  max="2048"
                />
              </div>
              <div class="form-row">
                <label for="resize-h">Höhe (px)</label>
                <input
                  type="number"
                  id="resize-h"
                  value="64"
                  min="1"
                  max="2048"
                />
              </div>
            </div>
            <div class="toggle-row" style="margin-top: 6px">
              <label for="keep-aspect">Seitenverhältnis beibehalten</label>
              <label class="toggle">
                <input type="checkbox" id="keep-aspect" checked />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>

        <!-- Code Options -->
        <div class="panel-section">
          <h3>Code-Optionen</h3>
          <div class="toggle-row">
            <label for="use-progmem">PROGMEM (Flash-Speicher)</label>
            <label class="toggle">
              <input type="checkbox" id="use-progmem" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="toggle-row">
            <label for="add-dims">Breite/Höhe als #define</label>
            <label class="toggle">
              <input type="checkbox" id="add-dims" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-row" style="margin-top: 8px">
            <label for="bytes-per-line">Bytes pro Zeile</label>
            <select id="bytes-per-line">
              <option value="8">8</option>
              <option value="16" selected>16</option>
              <option value="32">32</option>
            </select>
          </div>
        </div>

        <!-- Image List -->
        <div class="image-list" id="image-list">
          <div class="empty-list" id="empty-hint">
            Noch keine Bilder geladen.
          </div>
        </div>

        <!-- Actions -->
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-generate" disabled>
            ⚡ Generieren
          </button>
          <button class="btn btn-ghost" id="btn-clear" disabled>
            🗑 Leeren
          </button>
        </div>
      </div>
      <!-- /panel-left -->

      <!-- ── RIGHT PANEL ────────────────────────────────────── -->
      <div class="panel-right">
        <div class="output-header">
          <div>
            <h2>Generierter Code</h2>
            <div class="output-stats" id="output-stats"></div>
          </div>
          <div class="output-actions">
            <button class="btn btn-ghost" id="btn-copy" disabled>
              📋 Kopieren
            </button>
            <button class="btn btn-green" id="btn-download" disabled>
              ⬇ Download .h
            </button>
          </div>
        </div>

        <div class="code-area" id="code-area">
          <div class="code-placeholder" id="code-placeholder">
            <div class="big-icon">⚡</div>
            <p>
              Bilder laden, Einstellungen wählen und auf
              <strong>Generieren</strong> klicken.
            </p>
          </div>
          <pre id="code-output" style="display: none"></pre>
        </div>
      </div>
      <!-- /panel-right -->
    </div>
    <!-- /main -->

    <canvas id="canvas"></canvas>
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
  </body>
</html>
